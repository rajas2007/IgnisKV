name: Go CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  ci:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download dependencies
        run: go mod download

      - name: Verify formatting
        run: |
          FILES=$(gofmt -l .)
          if [ -n "$FILES" ]; then
            echo "The following files are not formatted:"
            echo "$FILES"
            exit 1
          fi

      - name: Go Vet
        run: go vet ./...

      - name: Run unit tests
        run: go test ./...

      - name: Run race detector
        run: go test -race ./...

      - name: Build project
        run: go build ./...
